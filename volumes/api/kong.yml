# Kong Configuration for Project: default
# Routes: auth, rest, storage, meta, project-api, dashboard
_format_version: '2.1'
_transform: true

consumers:
  - username: DASHBOARD
  - username: anon
    keyauth_credentials:
      - key: ${SUPABASE_ANON_KEY}
  - username: service_role
    keyauth_credentials:
      - key: ${SUPABASE_SERVICE_KEY}

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

basicauth_credentials:
  - consumer: DASHBOARD
    username: ${DASHBOARD_USERNAME}
    password: ${DASHBOARD_PASSWORD}

services:
  # Auth service routes
  - name: auth-v1-verify
    url: http://auth:9999/verify
    routes:
      - name: auth-v1-verify-route
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors
        config:
          origins:
            - '${CORS_ALLOW_ORIGIN}'
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - X-Requested-With
            - apikey
            - x-supabase-api-version
            - x-client-info
            - accept-profile
            - content-profile
            - prefer
            - Range
          exposed_headers:
            - Content-Length
            - Content-Range
          credentials: true
          max_age: 3600

  - name: auth-v1
    url: http://auth:9999
    routes:
      - name: auth-v1-route
        paths:
          - /auth/v1
    plugins:
      - name: cors
        config:
          origins:
            - '${CORS_ALLOW_ORIGIN}'
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - X-Requested-With
            - apikey
            - x-supabase-api-version
            - x-client-info
          exposed_headers:
            - Content-Length
            - Content-Range
          credentials: true
          max_age: 3600
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  - name: auth-v1-admin
    url: http://auth:9999/admin
    routes:
      - name: auth-v1-admin-route
        paths:
          - /auth/v1/admin
    plugins:
      - name: cors
        config:
          origins:
            - '${CORS_ALLOW_ORIGIN}'
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - apikey
          exposed_headers:
            - Content-Length
            - Content-Range
          credentials: true
          max_age: 3600
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin

  # REST (PostgREST) service routes
  - name: rest-v1
    url: http://rest:3000
    routes:
      - name: rest-v1-route
        paths:
          - /rest/v1
    plugins:
