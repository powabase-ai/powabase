  # Studio dashboard - catch-all route for everything not matched above,
  # gated by HTTP basic-auth (DASHBOARD consumer + credential above).
  # NOTE: studio:3001, not the upstream Supabase default of :3000 — this
  # fork's apps/studio/Dockerfile (production target) EXPOSEs/binds 3001.
  - name: dashboard
    url: http://studio:3001/
    routes:
      - name: dashboard-all
        strip_path: true
        paths:
          - /
    plugins:
      - name: cors
      - name: basic-auth
        config:
          hide_credentials: true
