          allow:
            - admin

  ## Realtime (WebSocket)
  ## Note: host must be "realtime-dev.supabase-realtime" because the Realtime service
  ## parses tenant_id from the Host header subdomain (before first dot = "realtime-dev")
  - name: realtime-v1-ws
    host: realtime-dev.supabase-realtime
    port: 4000
    path: /socket
    routes:
      - name: realtime-v1-ws
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
        config:
          origins:
            - '${CORS_ALLOW_ORIGIN}'
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  ## Realtime (REST API)
  - name: realtime-v1-rest
    host: realtime-dev.supabase-realtime
