  # Observability API - run/tool-call monitoring for the /observability dashboard.
  # project-api implements the full /api/observability/* family (health,
  # agent-runs, tool-calls, filter-options, ...) and requires a service_role
  # bearer, which the Studio self-host proxy injects. Without this route the
  # calls fall through to the dashboard basic-auth catch-all and 401, surfacing
  # a bogus persistent "Session expired" prompt on the project home + dashboard.
  - name: project-api-observability
